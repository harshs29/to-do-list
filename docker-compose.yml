version: '3.8'

services:

  mysql:

    image: mysql:8.0

    container_name: mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: todo_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  backend:

    build: ./backend

    container_name: flask

    depends_on:
      - mysql

    ports:
      - "5000:5000"

    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: todo_db

  frontend:

    build: ./frontend

    container_name: react

    depends_on:
      - backend

    ports:
      - "80:80"

volumes:

  mysql_data: